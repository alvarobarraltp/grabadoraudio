<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎙 Grabador — Lectura Activa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0f172a;color:white;}

.header{background:#1e1b4b;padding:14px 24px;display:flex;align-items:center;gap:12px;}
.header h1{font-size:17px;font-weight:900;flex:1;}
.mic-ok{background:#064e3b;color:#6ee7b7;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.mic-warn{background:#78350f;color:#fcd34d;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}

.progbarra{background:#334155;height:6px;}
.progfill{height:6px;background:#4f46e5;transition:width .3s;}

.filtros{background:#1e293b;padding:10px 16px;display:flex;gap:8px;overflow-x:auto;border-bottom:2px solid #0f172a;}
.fb{padding:6px 14px;border-radius:20px;border:2px solid #334155;background:transparent;color:#64748b;cursor:pointer;font-size:13px;font-weight:800;white-space:nowrap;}
.fb.on{background:#4f46e5;border-color:#4f46e5;color:white;}

/* Panel principal — centrado simple */
.panel{padding:32px 20px;text-align:center;max-width:600px;margin:0 auto;}

.badge{display:inline-block;font-size:12px;font-weight:800;padding:3px 14px;border-radius:20px;margin-bottom:8px;}
.bs{background:#312e81;color:#a5b4fc;}
.bp{background:#064e3b;color:#6ee7b7;}
.bm{background:#78350f;color:#fcd34d;}

.num{font-size:13px;color:#4b5563;font-weight:700;margin-bottom:6px;}
.txg{font-size:72px;font-weight:900;color:white;letter-spacing:4px;line-height:1.1;margin-bottom:8px;word-break:break-all;}
.txg.pal{font-size:44px;letter-spacing:1px;}
.txg.msg{font-size:26px;letter-spacing:0;line-height:1.4;}
.carp{font-size:12px;color:#3b82f6;background:#1e3a8a33;padding:3px 10px;border-radius:8px;display:inline-block;margin-bottom:4px;}
.arch{font-size:12px;color:#334155;font-family:monospace;margin-bottom:28px;}

/* Botón grabar */
.brec{width:90px;height:90px;border-radius:50%;border:4px solid rgba(255,255,255,.1);cursor:pointer;font-size:36px;margin:0 auto 14px;display:block;background:#dc2626;transition:all .18s;}
.brec:hover{transform:scale(1.06);}
.brec.grab{animation:p 1s infinite;}
.brec.ok{background:#059669;}
@keyframes p{0%{box-shadow:0 0 0 0 rgba(220,38,38,.5);}100%{box-shadow:0 0 0 20px rgba(220,38,38,0);}}

.etxt{font-size:15px;font-weight:800;margin-bottom:4px;min-height:22px;}
.ttxt{font-size:30px;font-weight:900;color:#1e293b;margin-bottom:20px;min-height:38px;}

/* Botones de acción */
.acciones{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
.btn{padding:11px 20px;border-radius:12px;border:2px solid transparent;cursor:pointer;font-size:14px;font-weight:900;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.besc{background:#1e293b;color:#94a3b8;border-color:#334155;}
.bmp3{background:#059669;color:white;font-size:15px;}

.nav{display:flex;gap:10px;justify-content:center;margin-bottom:12px;}
.bnav{padding:11px 24px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:900;}
.bprev{background:#1e293b;color:#64748b;border:2px solid #334155;}
.bnext{background:#4f46e5;color:white;}
.bnext:disabled{opacity:.4;cursor:not-allowed;}

.atj{font-size:11px;color:#334155;font-weight:700;margin-top:8px;}

/* Lista lateral */
.lateral{position:fixed;right:0;top:0;bottom:0;width:200px;background:#080f1e;border-left:2px solid #1e293b;overflow-y:auto;padding-top:120px;}
.lh{padding:10px 12px;font-size:11px;font-weight:800;color:#4b5563;text-transform:uppercase;border-bottom:1px solid #1e293b;}
.li{padding:7px 12px;font-size:13px;color:#4b5563;cursor:pointer;border-left:3px solid transparent;display:flex;justify-content:space-between;}
.li:hover{background:#1e293b;color:#94a3b8;}
.li.act{background:#1e293b;color:white;border-left-color:#4f46e5;}
.li.ok{color:#34d399;}

@media(max-width:700px){.lateral{display:none;}}
</style>
</head>
<body>

<div class="header">
  <h1>🎙 Grabador — Lectura Activa</h1>
  <div id="mic-label" class="mic-ok">🎙 Detectando...</div>
</div>
<div class="progbarra"><div class="progfill" id="pf" style="width:0%"></div></div>

<div class="filtros">

</div>

<div class="panel">

  <div class="carp" id="carp">📁 audio/silabas/</div><br>
  <div class="arch" id="arch">sil_ba.mp3</div>

  <button class="brec" id="brec" onclick="toggleGrabar()">🎙</button>
  <div class="etxt" id="etxt">Toca el botón rojo para grabar</div>
  <div class="ttxt" id="ttxt"></div>

  <div class="acciones">
    <button class="btn besc" id="besc" onclick="escuchar()" disabled>▶ Escuchar</button>
    <button class="btn bmp3" id="bmp3" onclick="guardar()" disabled>⬇ Guardar MP3</button>
  </div>
  <div class="nav">
    <button class="bnav bprev" onclick="anterior()">← Anterior</button>
    <button class="bnav bnext" id="bnext" onclick="siguiente()" disabled>Siguiente →</button>
  </div>
  <div class="atj">⎵ Grabar &nbsp;·&nbsp; → Siguiente &nbsp;·&nbsp; ← Anterior &nbsp;·&nbsp; P Escuchar &nbsp;·&nbsp; S Guardar</div>
</div>

<div class="lateral">
  <div class="lh" id="lh">339 items</div>
  <div id="ll"></div>
</div>

"archivo": "msg_vamos_asociar", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Debes completar todos los ejercicios", "archivo": "msg_completa_ejercicios", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Debes completar el dictado completo", "archivo": "msg_completa_dictado", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Debes responder todas las preguntas", "archivo": "msg_completa_preguntas", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Juega al menos tres rondas", "archivo": "msg_juega_rondas", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Completaste todas las palabras", "archivo": "msg_completaste", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Forma la palabra", "archivo": "msg_forma_palabra", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Asocia las sílabas para formar palabras", "archivo": "msg_asocia", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Las palabras son", "archivo": "msg_palabras_son", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Completaste el día", "archivo": "msg_completaste_dia", "tipo": "Mensaje", "carpeta": "mensajes"}];
let filt=[...ITEMS],idx=0,micId=null,rec=null,chunks=[],grab=false,timer=null,seg=0,aUrl=null,aBlob=null;
const grabados=new Set(),audios={};

async function initMic(){
  try{
    const p=await navigator.mediaDevices.getUserMedia({audio:true});
    p.getTracks().forEach(t=>t.stop());
    const devs=await navigator.mediaDevices.enumerateDevices();
    const mics=devs.filter(d=>d.kind==='audioinput');
    const dji=mics.find(d=>d.label.toLowerCase().includes('dji')||d.label.toLowerCase().includes('wireless')||d.label.toLowerCase().includes('mini'));
    const mic=dji||mics[0];
    if(mic){micId=mic.deviceId;setMic('🎙 '+mic.label.slice(0,30),dji);}
  }catch(e){setMic('❌ Permite el micrófono',false);}
}
function setMic(t,ok){const el=document.getElementById('mic-label');el.textContent=t;el.className=ok?'mic-ok':'mic-warn';}
function getStream(){return navigator.mediaDevices.getUserMedia(micId?{audio:{deviceId:{exact:micId}}}:{audio:true});}

function fil(tipo,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  filt=tipo==='todos'?[...ITEMS]:tipo==='pendiente'?ITEMS.filter(it=>!grabados.has(it.archivo)):ITEMS.filter(it=>it.tipo===tipo);
  idx=0;render();renderLat();
}

function render(){
  const it=filt[idx];if(!it)return;
  const t1=it.tipo[0];
  document.getElementById('badge').textContent=it.tipo.toUpperCase();
  document.getElementById('badge').className='badge '+(t1==='S'?'bs':t1==='P'?'bp':'bm');
  document.getElementById('num').textContent=(idx+1)+' / '+filt.length;
  const tg=document.getElementById('txg');
  tg.textContent=it.texto;
  tg.className='txg'+(it.tipo==='Palabra'?' pal':it.tipo==='Mensaje'?' msg':'');
  document.getElementById('carp').textContent='📁 audio/'+it.carpeta+'/';
  document.getElementById('arch').textContent=it.archivo+'.mp3';
  const ok=grabados.has(it.archivo);
  document.getElementById('brec').className='brec'+(ok?' ok':'');
  document.getElementById('brec').textContent='🎙';
  document.getElementById('etxt').textContent=ok?'✅ Grabada — graba de nuevo si quieres':'Toca el botón rojo para grabar';
  document.getElementById('ttxt').textContent='';
  document.getElementById('besc').disabled=!ok;
  document.getElementById('bmp3').disabled=!ok;
  document.getElementById('bnext').disabled=!ok;
  aUrl=ok&&audios[it.archivo]?audios[it.archivo].url:null;
  aBlob=ok&&audios[it.archivo]?audios[it.archivo].blob:null;
  prog();renderLat();
  setTimeout(()=>{const e=document.getElementById('li-'+idx);if(e)e.scrollIntoView({block:'center'});},50);
}
function prog(){
  document.getElementById('pf').style.width=(grabados.size/ITEMS.length*100)+'%';
}
function renderLat(){
  document.getElementById('lh').textContent=filt.length+' items';
  document.getElementById('ll').innerHTML=filt.map((it,i)=>
    `<div class="li ${i===idx?'act':''} ${grabados.has(it.archivo)?'ok':''}" id="li-${i}" onclick="irA(${i})">
      <span>${it.texto}</span><span>${grabados.has(it.archivo)?'✓':''}</span>
    </div>`
  ).join('');
}
function irA(i){idx=i;render();}
function anterior(){if(idx>0){idx--;render();}}
function siguiente(){if(idx<filt.length-1){idx++;render();}else alert('🎉 ¡Completaste todos!');}

async function toggleGrabar(){
  if(grab){
    rec.stop();grab=false;clearInterval(timer);
    document.getElementById('brec').textContent='🎙';
    document.getElementById('etxt').textContent='⏳ Guardando MP3...';
  }else{
    try{
      const stream=await getStream();
      chunks=[];
      const mime=MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':
                 MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'';
      rec=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
      rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
      rec.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunks,{type:mime||'audio/webm'});
        const url=URL.createObjectURL(blob);
        const it=filt[idx];
        grabados.add(it.archivo);audios[it.archivo]={blob,url};
        aBlob=blob;aUrl=url;
        document.getElementById('brec').className='brec ok';
        document.getElementById('etxt').textContent='✅ ¡Lista!';
        document.getElementById('besc').disabled=false;
        document.getElementById('bmp3').disabled=false;
        document.getElementById('bnext').disabled=false;
        prog();renderLat();
        guardar();
      };
      rec.start(100);grab=true;seg=0;
      document.getElementById('brec').className='brec grab';
      document.getElementById('brec').textContent='⏹';
      document.getElementById('etxt').textContent='🔴 Grabando... toca ⏹ para detener';
      timer=setInterval(()=>{
        seg++;
        document.getElementById('ttxt').textContent=(Math.floor(seg/60)?Math.floor(seg/60)+'m ':'')+seg%60+'s';
      },1000);
    }catch(e){document.getElementById('etxt').textContent='❌ '+e.message;}
  }
}
function escuchar(){if(aUrl)new Audio(aUrl).play();}
function guardar(){
  if(!aBlob||!aUrl)return;
  const it=filt[idx];
  const a=document.createElement('a');a.href=aUrl;a.download=it.archivo+'.mp3';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();toggleGrabar();}
  else if(e.code==='ArrowRight'){e.preventDefault();siguiente();}
  else if(e.code==='ArrowLeft'){e.preventDefault();anterior();}
  else if(e.code==='KeyP'){e.preventDefault();escuchar();}
  else if(e.code==='KeyS'){e.preventDefault();guardar();}
});
initMic();render();
</script>
