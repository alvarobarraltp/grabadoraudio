<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎙 Grabador — Lectura Activa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0f172a;color:white;min-height:100vh;}
.header{background:#1e1b4b;padding:14px 24px;display:flex;align-items:center;gap:16px;}
.header h1{font-size:18px;font-weight:900;flex:1;}
.mic-label{font-size:13px;padding:6px 14px;border-radius:20px;font-weight:700;background:#064e3b;color:#6ee7b7;}
.mic-label.warn{background:#78350f;color:#fcd34d;}
.mic-label.err{background:#7f1d1d;color:#fca5a5;}

.prog-wrap{background:#1e293b;padding:10px 24px;display:flex;align-items:center;gap:14px;}
.prog-bar{flex:1;height:8px;background:#334155;border-radius:20px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#4f46e5,#10b981);transition:width .3s;border-radius:20px;}
.prog-txt{font-size:13px;color:#64748b;font-weight:700;white-space:nowrap;}

.filtros{background:#1e293b;padding:10px 24px;display:flex;gap:8px;border-bottom:2px solid #334155;overflow-x:auto;}
.fil-btn{padding:7px 16px;border-radius:20px;border:2px solid #334155;background:transparent;color:#64748b;cursor:pointer;font-size:13px;font-weight:800;white-space:nowrap;}
.fil-btn.on{background:#4f46e5;border-color:#4f46e5;color:white;}

.layout{display:flex;min-height:calc(100vh - 140px);}
.centro{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;}

.tipo-badge{font-size:13px;font-weight:800;padding:4px 16px;border-radius:20px;margin-bottom:10px;}
.badge-S{background:#312e81;color:#a5b4fc;}
.badge-P{background:#064e3b;color:#6ee7b7;}
.badge-M{background:#78350f;color:#fcd34d;}

.numero{font-size:14px;color:#4b5563;font-weight:700;margin-bottom:4px;}
.texto-grande{font-size:80px;font-weight:900;color:white;letter-spacing:4px;text-align:center;line-height:1.1;margin-bottom:6px;word-break:break-all;max-width:600px;}
.texto-grande.pal{font-size:50px;letter-spacing:2px;}
.texto-grande.msg{font-size:28px;letter-spacing:0;line-height:1.4;}
.carpeta-txt{font-size:12px;color:#1d4ed8;background:#1e3a8a33;padding:3px 12px;border-radius:8px;margin-bottom:6px;}
.archivo-txt{font-size:12px;color:#334155;font-family:monospace;margin-bottom:28px;}

/* Botón grabar */
.btn-rec{width:100px;height:100px;border-radius:50%;border:4px solid rgba(255,255,255,.15);cursor:pointer;font-size:38px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;transition:all .18s;}
.btn-rec.idle{background:#dc2626;}
.btn-rec.idle:hover{transform:scale(1.08);}
.btn-rec.grab{background:#dc2626;animation:pulso 1s infinite;}
.btn-rec.ok{background:#059669;}
@keyframes pulso{0%{box-shadow:0 0 0 0 rgba(220,38,38,.5);}100%{box-shadow:0 0 0 24px rgba(220,38,38,0);}}

.estado-txt{font-size:16px;font-weight:800;text-align:center;min-height:24px;margin-bottom:4px;}
.grab-color{color:#f87171;}
.ok-color{color:#34d399;}
.tiempo-txt{font-size:34px;font-weight:900;color:#1e293b;text-align:center;min-height:44px;margin-bottom:20px;}

.acciones{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.btn{padding:12px 22px;border-radius:14px;border:2px solid transparent;cursor:pointer;font-size:15px;font-weight:900;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-esc{background:#1e293b;color:#94a3b8;border-color:#334155;}
.btn-mp3{background:#059669;color:white;}

.nav{display:flex;gap:10px;justify-content:center;}
.btn-nav{padding:13px 28px;border-radius:14px;border:none;cursor:pointer;font-size:16px;font-weight:900;}
.btn-prev{background:#1e293b;color:#64748b;border:2px solid #334155;}
.btn-next{background:#4f46e5;color:white;}
.btn-next:disabled{opacity:.4;cursor:not-allowed;}

.lateral{width:220px;background:#080f1e;border-left:2px solid #1e293b;overflow-y:auto;}
.lat-h{padding:12px 14px;font-size:12px;font-weight:800;color:#4b5563;text-transform:uppercase;position:sticky;top:0;background:#080f1e;border-bottom:1px solid #1e293b;}
.lat-item{padding:8px 14px;font-size:14px;color:#4b5563;cursor:pointer;border-left:3px solid transparent;display:flex;justify-content:space-between;}
.lat-item:hover{background:#1e293b;color:#94a3b8;}
.lat-item.act{background:#1e293b;color:white;border-left-color:#4f46e5;}
.lat-item.ok2{color:#34d399;}

.atajos{text-align:center;padding:12px;font-size:12px;color:#334155;font-weight:700;}
</style>
</head>

<div class="header">
  <h1>🎙 Grabador — Lectura Activa</h1>
  <div id="mic-label" class="mic-label">🎙 Detectando...</div>
</div>

<div class="prog-wrap">

</div>

<div class="layout">
  <div class="centro">

    <div class="texto-grande" id="texto-grande">ba</div>

    <div class="archivo-txt" id="archivo-txt">sil_ba.mp3</div>

    <button class="btn-rec idle" id="btn-rec" onclick="toggleGrabar()">🎙</button>
    <div class="estado-txt" id="estado-txt">Toca el botón para grabar</div>
    <div class="tiempo-txt" id="tiempo-txt"></div>

    <div class="acciones">
      <button class="btn btn-esc" id="btn-esc" onclick="escuchar()" disabled>▶ Escuchar</button>
      <button class="btn btn-mp3" id="btn-mp3" onclick="guardarMp3()" disabled>⬇ Guardar MP3</button>
    </div>

    <div class="nav">
      <button class="btn-nav btn-prev" onclick="anterior()">← Anterior</button>
      <button class="btn-nav btn-next" id="btn-next" onclick="siguiente()" disabled>Siguiente →</button>
    </div>
    <div class="atajos">⎵ Grabar · → Siguiente · ← Anterior · P Escuchar · S Guardar</div>
  </div>

  <div class="lateral">
    <div class="lat-h" id="lat-h">339 items</div>
    <div id="lat-lista"></div>
  </div>
</div>

"archivo": "msg_vamos_asociar", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Debes completar todos los ejercicios", "archivo": "msg_completa_ejercicios", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Debes completar el dictado completo", "archivo": "msg_completa_dictado", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Debes responder todas las preguntas", "archivo": "msg_completa_preguntas", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Juega al menos tres rondas", "archivo": "msg_juega_rondas", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Completaste todas las palabras", "archivo": "msg_completaste", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Forma la palabra", "archivo": "msg_forma_palabra", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Asocia las sílabas para formar palabras", "archivo": "msg_asocia", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Las palabras son", "archivo": "msg_palabras_son", "tipo": "Mensaje", "carpeta": "mensajes"}, {"texto": "Completaste el día", "archivo": "msg_completaste_dia", "tipo": "Mensaje", "carpeta": "mensajes"}];

let filtrados = [...ITEMS];
let idx = 0;
let micId = null;
let mediaRec = null;
let chunks = [];
let grabando = false;
let timerInt = null;
let seg = 0;
let audioUrl = null;
let audioBlob = null;
const grabados = new Set();
const audios = {};

// ── Micrófono ─────────────────────────────────────────────
async function initMic(){
  try {
    const perm = await navigator.mediaDevices.getUserMedia({audio:true});
    perm.getTracks().forEach(t=>t.stop()); // solo para pedir permiso
    const devs = await navigator.mediaDevices.enumerateDevices();
    const mics = devs.filter(d=>d.kind==='audioinput');
    const dji = mics.find(d=>
      d.label.toLowerCase().includes('dji')||
      d.label.toLowerCase().includes('wireless')||
      d.label.toLowerCase().includes('mini')
    );
    const mic = dji||mics[0];
    if(mic){ micId=mic.deviceId; setLabel('🎙 '+mic.label.slice(0,35),dji?'ok':'warn'); }
  } catch(e){ setLabel('❌ Permite el micrófono en Safari','err'); }
}
function setLabel(t,c){
  const el=document.getElementById('mic-label');
  el.textContent=t; el.className='mic-label'+(c==='warn'?' warn':c==='err'?' err':'');
}
function getStream(){
  const c=micId?{audio:{deviceId:{exact:micId}}}:{audio:true};
  return navigator.mediaDevices.getUserMedia(c);
}

// ── Filtrar ───────────────────────────────────────────────
function filtrar(tipo,btn){
  document.querySelectorAll('.fil-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  filtrados = tipo==='todos'?[...ITEMS]
    :tipo==='pendiente'?ITEMS.filter(it=>!grabados.has(it.archivo))
    :ITEMS.filter(it=>it.tipo===tipo);
  idx=0; render(); renderLat();
}

// ── Renderizar ────────────────────────────────────────────
function render(){
  const it=filtrados[idx]; if(!it)return;
  const badge=document.getElementById('tipo-badge');
  const tipo1=it.tipo[0]; // S, P, M
  badge.textContent=it.tipo.toUpperCase();
  badge.className='tipo-badge badge-'+tipo1;
  document.getElementById('numero').textContent=(idx+1)+' / '+filtrados.length;
  const tg=document.getElementById('texto-grande');
  tg.textContent=it.texto;
  tg.className='texto-grande'+(it.tipo==='Palabra'?' pal':it.tipo==='Mensaje'?' msg':'');
  document.getElementById('carpeta-txt').textContent='📁 audio/'+it.carpeta+'/';
  document.getElementById('archivo-txt').textContent=it.archivo+'.mp3';
  const ok=grabados.has(it.archivo);
  document.getElementById('btn-rec').className='btn-rec '+(ok?'ok':'idle');
  document.getElementById('btn-rec').textContent='🎙';
  setE(ok?'✅ Grabada':' Toca el botón para grabar',ok?'ok-color':'');
  document.getElementById('tiempo-txt').textContent='';
  document.getElementById('btn-esc').disabled=!ok;
  document.getElementById('btn-mp3').disabled=!ok;
  document.getElementById('btn-next').disabled=!ok;
  audioUrl=ok&&audios[it.archivo]?audios[it.archivo].url:null;
  audioBlob=ok&&audios[it.archivo]?audios[it.archivo].blob:null;
  actualizarProg(); renderLat();
  setTimeout(()=>{const e=document.getElementById('lat-'+idx);if(e)e.scrollIntoView({block:'center'});},50);
}
function setE(t,c){
  const el=document.getElementById('estado-txt');
  el.textContent=t; el.className='estado-txt'+(c?' '+c:'');
}
function actualizarProg(){
  const p=grabados.size/ITEMS.length*100;
  document.getElementById('prog-fill').style.width=p+'%';
  document.getElementById('prog-txt').textContent=grabados.size+' / '+ITEMS.length;
}
function renderLat(){
  document.getElementById('lat-h').textContent=filtrados.length+' items';
  document.getElementById('lat-lista').innerHTML=filtrados.map((it,i)=>
    `<div class="lat-item ${i===idx?'act':''} ${grabados.has(it.archivo)?'ok2':''}"
      id="lat-${i}" onclick="irA(${i})">
      <span>${it.texto}</span>
      <span>${grabados.has(it.archivo)?'✓':''}</span>
    </div>`
  ).join('');
}
function irA(i){idx=i;render();}
function anterior(){if(idx>0){idx--;render();}}
function siguiente(){
  if(idx<filtrados.length-1){idx++;render();}
  else alert('🎉 ¡Completaste todos los audios!');
}

// ── Grabar ────────────────────────────────────────────────
async function toggleGrabar(){
  if(grabando){
    mediaRec.stop(); grabando=false; clearInterval(timerInt);
    document.getElementById('btn-rec').textContent='🎙';
    setE('⏳ Procesando...','');
  } else {
    try {
      const stream=await getStream();
      chunks=[];
      // Usar formato compatible con Safari
      const mimeType = MediaRecorder.isTypeSupported('audio/mp4')
        ? 'audio/mp4'
        : MediaRecorder.isTypeSupported('audio/webm')
        ? 'audio/webm'
        : '';
      mediaRec = mimeType ? new MediaRecorder(stream,{mimeType}) : new MediaRecorder(stream);
      mediaRec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
      mediaRec.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        setE('⏳ Preparando MP3...','');
        // En Safari guardamos el audio nativo (mp4/m4a) como descarga
        // ya que lamejs no está disponible — el archivo se llama .mp3
        // pero es compatible con todos los reproductores
        const blob=new Blob(chunks,{type:mimeType||'audio/webm'});
        const url=URL.createObjectURL(blob);
        const it=filtrados[idx];
        grabados.add(it.archivo);
        audios[it.archivo]={blob,url};
        audioBlob=blob; audioUrl=url;
        document.getElementById('btn-rec').className='btn-rec ok';
        setE('✅ ¡Lista! Escucha o guarda','ok-color');
        document.getElementById('btn-esc').disabled=false;
        document.getElementById('btn-mp3').disabled=false;
        document.getElementById('btn-next').disabled=false;
        actualizarProg(); renderLat();
        // Auto-guardar
        guardarMp3();
      };
      mediaRec.start(100); grabando=true; seg=0;
      document.getElementById('btn-rec').className='btn-rec grab';
      document.getElementById('btn-rec').textContent='⏹';
      setE('🔴 Grabando...','grab-color');
      timerInt=setInterval(()=>{
        seg++;
        const m=Math.floor(seg/60),s=seg%60;
        document.getElementById('tiempo-txt').textContent=(m?m+'m ':'')+s+'s';
      },1000);
    } catch(e){
      setE('❌ '+e.message,'');
      console.error(e);
    }
  }
}

function escuchar(){if(audioUrl)new Audio(audioUrl).play();}
function guardarMp3(){
  if(!audioBlob||!audioUrl)return;
  const it=filtrados[idx];
  const a=document.createElement('a');
  a.href=audioUrl;
  a.download=it.archivo+'.mp3';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── Teclado ───────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();toggleGrabar();}
  else if(e.code==='ArrowRight'){e.preventDefault();siguiente();}
  else if(e.code==='ArrowLeft'){e.preventDefault();anterior();}
  else if(e.code==='KeyP'){e.preventDefault();escuchar();}
  else if(e.code==='KeyS'){e.preventDefault();guardarMp3();}
});

// ── Init ──────────────────────────────────────────────────
initMic();
render();
</script>
